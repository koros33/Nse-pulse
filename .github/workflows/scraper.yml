name: Daily Scraper

on:
  schedule:
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: ./scraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug Secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "🔍 Starting scraper..."
          echo "📡 DATABASE_URL configured: ${{ secrets.DATABASE_URL != '' }}"
          echo "📡 URL prefix: ${DATABASE_URL:0:70}..."
          echo "📡 Length of DATABASE_URL: ${#DATABASE_URL}"

      - name: Run Scraper
        working-directory: ./scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scraper.py